on:
  workflow_dispatch: 

name: Create release and build artifacts

jobs:
  build_win:
    name: Build Windows artifacts
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2 + UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-7zip
            mingw-w64-ucrt-x86_64-hwloc
            cmake
            git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout deps
        run: git clone https://github.com/xmrig/xmrig-deps.git

      - name: Build project on Windows
        run: |
          mkdir build && cd build
          
          # Optimization Flags for Zen 3 (znver3)
          export CFLAGS="-Ofast -march=znver3 -flto -fuse-linker-plugin"
          export CXXFLAGS="-Ofast -march=znver3 -flto -fuse-linker-plugin"
          export LDFLAGS="-flto"

          cmake .. -G "Unix Makefiles" \
            -DXMRIG_DEPS=../xmrig-deps/gcc/x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_LTO=ON \
            -DWITH_LIBCPUID=ON \
            -DWITH_HWLOC=ON \
            -DSTATIC_PIC=ON
          
          make -j$(nproc)
          
          # Prepare artifacts
          cp ../src/config.json .
          cp ../bin/WinRing0/WinRing0x64.sys .
          7z a -tzip -mx9 ../xmrig-znver3-optimized.zip xmrig.exe config.json WinRing0x64.sys

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_znver3_build
          path: xmrig-znver3-optimized.zip

  deploy:
    needs: [build_win]
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows_znver3_build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: xmrig-znver3-optimized.zip
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }} (Zen 3 Optimized)"
