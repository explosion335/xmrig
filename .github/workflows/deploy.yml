on:
  workflow_dispatch: 

name: Create release and build artifacts

jobs:
  build_win:
    name: Build Windows artifacts
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2 + UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-7zip
            cmake
            git

      - name: Checkout code
        uses: actions/checkout@master

      - name: Checkout deps
        run: git clone https://github.com/xmrig/xmrig-deps.git

      - name: Build project on Windows
        run: |
          mkdir build && cd build
          

          export CFLAGS="-O3 -ffast-math -march=znver3 -flto -fuse-linker-plugin"
          export CXXFLAGS="-O3 -ffast-math -march=znver3 -flto -fuse-linker-plugin"
          export LDFLAGS="-flto"

          cmake .. -G "Unix Makefiles" \
            -DXMRIG_DEPS=../xmrig-deps/gcc/x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_LTO=ON \
            -DWITH_LIBCPUID=ON \
            -DWITH_ADL=OFF \
            -DWITH_NVML=OFF \
            -DSTATIC_PIC=ON \
            -DWITH_EMBEDDED_CONFIG=OFF
          
          # Use all available cores on the runner to build faster
          make -j$(nproc)
          
          cp ./src/config.json .
          cp ./bin/WinRing0/WinRing0x64.sys .
          7z a -tzip -mx windows_build.zip xmrig.exe config.json WinRing0x64.sys

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip

  deploy:
    needs: [build_win]
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Set version
        id: version
        run: echo ::set-output name=VERSION::$GITHUB_REF_NAME
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows_build
      - name: Upload Windows build release asset
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: windows_build.zip
          asset_name: xmrig-${{steps.version.outputs.VERSION}}-win64.zip
          asset_content_type: application/zip
